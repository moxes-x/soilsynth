version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - rm -f .env.production
        - env | grep -E '^(SMTP_HOST|SMTP_PORT|SMTP_USER|SMTP_PASS|SMTP_SECURE|SMTP_USERNAME|SMTP_PASSWORD|SMTP_CONNECTION_TIMEOUT_MS|SMTP_GREETING_TIMEOUT_MS|SMTP_SOCKET_TIMEOUT_MS|EMAIL_SERVER|EMAIL_PORT|EMAIL_USER|EMAIL_PASSWORD|EMAIL_SECURE|MAIL_HOST|MAIL_PORT|MAIL_USER|MAIL_PASS|MAIL_PASSWORD|MAIL_SECURE|SES_SMTP_HOST|SES_SMTP_USER|SES_SMTP_USERNAME|SES_SMTP_PASS|SES_SMTP_PASSWORD|ACCESS_FROM_EMAIL|ACCESS_TO_EMAIL|NEXT_PUBLIC_ACCESS_ENDPOINT|DEBUG_ENV_TOKEN)=' >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

